<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>درس ۱: خانواده - سطح A2</title>
  <link rel="stylesheet" href="lesson.css">
</head>
<body>

<div id="hud">
  ❤️ <span id="heart-count"></span>
  <span id="heart-timer" style="font-size: 0.85em; color: #ef5350; margin-left: 5px;"></span>
  ⭐ <span id="xp-display">0</span> XP
</div>

<div id="app">
  <h2 id="question-title"></h2>
  <div id="question-content"></div>
  <div id="word-builder" class="word-builder hidden" tabindex="0" aria-label="Sentence builder"></div>
  <div id="options"></div>
</div>

<script src="../../../dataStorage.js"></script>
<script src="lesson12.js"></script>

<script>
  // ======= تایمر قلب =======
  function startHeartTimer() {
    const timerElement = document.getElementById("heart-timer");
    const heartDisplay = document.getElementById("heart-count");
    const xpDisplay = document.getElementById("xp-display");

    function updateUI() {
      if (heartDisplay) heartDisplay.textContent = getHearts();
      if (xpDisplay) xpDisplay.textContent = getTotalXP();
    }

    updateUI();

    setInterval(() => {
      const regenerated = checkAndRegenHearts();
      if (regenerated && heartDisplay) {
        heartDisplay.textContent = getHearts();
      }

      const secondsLeft = getTimeUntilNextHeart();
      if (secondsLeft === null) {
        if (timerElement) timerElement.textContent = "";
      } else {
        const minutes = Math.floor(secondsLeft / 60);
        const seconds = secondsLeft % 60;
        timerElement.textContent = ` (${minutes}:${seconds < 10 ? '0' : ''}${seconds})`;
      }

      if (xpDisplay) xpDisplay.textContent = getTotalXP();
    }, 1000);
  }

  window.addEventListener('DOMContentLoaded', startHeartTimer);
</script>

</body>
</html>
