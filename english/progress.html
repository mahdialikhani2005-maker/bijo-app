<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<script src="config.js"></script>
  <meta charset="UTF-8" />
  <title>پیشرفت</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* نب‌بار مشترک: این استایل رو بعداً می‌تونی ببری تو style.css */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 150; }
    .bottom-nav-inner {
      direction: ltr;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: white;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
      padding: 10px 0;
    }
    .bottom-nav .nav-item { opacity: 0.45; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .bottom-nav .nav-item.active { opacity: 1; }
    .bottom-nav .nav-item img { width: 26px; height: 26px; }
    .bottom-nav .nav-item .nav-icon-emoji { font-size: 22px; }
    body { padding-bottom: 64px; }
  </style>
</head>
<body>

  <header class="progress-header">
    <div class="hearts-box">
      ❤️ <span id="heart-count">5</span>
      <span id="heart-timer" style="font-size:0.85em; color:#ef5350; margin-left:5px;"></span>
    </div>
    <div class="xp-box">
      ⭐ <span id="total-xp">0</span> XP
    </div>
  </header>

  <main class="page">
    <h2 class="title">پیشرفت</h2>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">XP کل</div>
        <div class="stat-value" id="stat-total-xp">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">دل‌های شما</div>
        <div class="stat-value" id="stat-hearts">5 ❤️</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">درس‌های تمام‌شده</div>
        <div class="stat-value" id="stat-lessons-done">0 / 20</div>
      </div>
    </section>
  </main>

  <!-- نب‌بار مشترک: درس | مرور | خونه | پیشرفت | پروفایل -->
  <footer class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="#" id="nav-lesson" class="nav-item">
        <img src="/assets/icons/lesson.png" alt="درس">
      </a>
      <a href="#" id="nav-review" class="nav-item">
        <span class="nav-icon-emoji">🔁</span>
      </a>
      <a href="#" id="nav-home" class="nav-item">
        <span class="nav-icon-emoji">🏠</span>
      </a>
      <a href="#" id="nav-progress" class="nav-item active">
        <img src="/assets/icons/progress.png" alt="پیشرفت">
      </a>
      <a href="#" id="nav-profile" class="nav-item">
        <img src="/assets/icons/profile.png" alt="پروفایل">
      </a>
    </div>
  </footer>

  <script src="../dataStorage.js"></script>
  <script type="module" src="../courseRouter.js"></script>
  <script>
    window.onload = async function() {
      await initUserData();

      const hearts = getHearts();
      const xp = getTotalXP();

      document.getElementById("heart-count").textContent = hearts;
      document.getElementById("total-xp").textContent = xp;
      document.getElementById("stat-total-xp").textContent = xp;
      document.getElementById("stat-hearts").textContent = hearts + " ❤️";

      const lessonsCompleted = parseInt(localStorage.getItem("lessonsCompleted") || "0");
      document.getElementById("stat-lessons-done").textContent = lessonsCompleted + " / 20";

      setInterval(() => {
        checkAndRegenHearts();
        const h = getHearts();
        document.getElementById("heart-count").textContent = h;
        document.getElementById("stat-hearts").textContent = h + " ❤️";

        const timerElement = document.getElementById("heart-timer");
        const seconds = getTimeUntilNextHeart();
        if (seconds === null) {
          timerElement.textContent = "";
        } else {
          const hr = Math.floor(seconds / 3600);
          const mn = Math.floor((seconds % 3600) / 60);
          const sc = seconds % 60;
          timerElement.textContent = ` (${hr}:${String(mn).padStart(2,"0")}:${String(sc).padStart(2,"0")})`;
        }
      }, 1000);
    };
  </script>

</body>
</html>
