<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<script src="config.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bijo - اپلیکیشن آموزش زبان</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4A90E2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bijo" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="media/pp.png" />
    <link rel="apple-touch-icon" href="media/pp.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png" />

    <!-- برای اینکه تو مرورگر موبایل شبیه اپ بشه -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph (برای وقتی لینک به اشتراک گذاشته میشه) -->
    <meta property="og:title" content="Bijo App" />
    <meta property="og:description" content="اپلیکیشن آموزش زبان" />
    <meta property="og:image" content="media/pp.png" />

    <!-- نب‌بار مشترک: این استایل رو بعداً می‌تونی ببری تو style.css -->
    <style>
      .bottom-nav {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        border-radius: 0 !important;
        z-index: 150;
      }
      .bottom-nav-inner {
        direction: ltr;
        display: flex;
        width: 100%;
        justify-content: space-around;
        align-items: center;
        background: white;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
        padding: 10px 0;
        box-sizing: border-box;
      }
      .bottom-nav .nav-item { opacity: 0.45; text-decoration: none; display: flex; align-items: center; justify-content: center; }
      .bottom-nav .nav-item.active { opacity: 1; }
      .bottom-nav .nav-item img { width: 26px; height: 26px; }
      .bottom-nav .nav-item .nav-icon-emoji { font-size: 22px; }
      body { padding-bottom: 64px; } /* جا برای نب‌بار ثابت */
    </style>
</head>
<body>

    <div class="brand">
        <img src="media/pp.png" alt="App Icon" class="brand__icon" />
        <div class="brand__name">bijo</div>
    </div>

    <div class="container">
        <h1 class="title">یک زبان را انتخاب کنید </h1>

        <div class="languages">

            <a class="lang-card" href="english/index.html">

            </a>

            <a class="lang-card" href="french/index.html">

            <a class="lang-card" href="spanish/index.html">
                <img src="assets/es.png" alt="Spanish" />
                <span>اسپانیایی</span>
            </a>

            <a class="lang-card" href="german/index.html">
                <img src="assets/de.png" alt="German" />
                <span>المانی</span>
            </a>

            <a class="lang-card" href="italian/index.html">
                <img src="assets/it.png" alt="Italian" />
                <span>ایتالیایی</span>
            </a>

            <a class="lang-card" href="turkish/index.html">
                <img src="assets/tr.png" alt="Turkish" />
                <span>ترکی</span>
            </a>

            <a class="lang-card" href="arabic/index.html">
                <img src="assets/ar.png" alt="Arabic" />
                <span>عربی</span>
            </a>

            <a class="lang-card" href="russian/index.html">
                <img src="assets/ru.png" alt="Russian" />
                <span>روسی</span>
            </a>

            <a class="lang-card" href="japanese/index.html">
                <img src="assets/ja.png" alt="Japanese" />
                <span>ژاپنی</span>
            </a>

            <a class="lang-card" href="korean/index.html">
                <img src="assets/ko.png" alt="Korean" />
                <span>کره ای</span>

            <a class="lang-card" href="chinese/index.html">
                <img src="assets/zh.png" alt="Chinese" />
                <span>چینی</span>
            </a>

        </div>

    <!-- نب‌بار مشترک: درس | مرور | پیشرفت | پروفایل -->
    <footer class="bottom-nav">
      <div class="bottom-nav-inner">
        <a href="#" id="nav-lesson" class="nav-item">
          <img src="/assets/icons/lesson.png" alt="درس">
        </a>
        <a href="#" id="nav-review" class="nav-item">
          <span class="nav-icon-emoji">🔁</span>
        </a>
        <a href="#" id="nav-progress" class="nav-item">
          <img src="/assets/icons/progress.png" alt="پیشرفت">
        </a>
        <a href="#" id="nav-profile" class="nav-item">
          <img src="/assets/icons/profile.png" alt="پروفایل">
        </a>
      </div>
    </footer>

<script src="courseRouter.js" type="module"></script>

<script>
  // ثبت سرویس ورکر برای PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('Service Worker registered successfully:', registration);
        })
        .catch(error => {
          console.log('Service Worker registration failed:', error);
        });
    });
  }

  // بررسی اینکه برنامه نصب شده یا نه
  window.addEventListener('beforeinstallprompt', (e) => {
    // جلوگیری از نمایش خودکار
    e.preventDefault();
    // اینجا میتونی دکمه نصب رو به کاربر نشون بدی
    console.log('App can be installed!');
  });
</script>
</body>
</html>
