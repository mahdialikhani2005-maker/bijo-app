<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<script src="config.js"></script>
  <meta charset="UTF-8">
  <title>مرور</title>
  <link rel="stylesheet" href="/english/lessons/lesson.css">
  <style>
    /* نب‌بار مشترک: این استایل رو بعداً می‌تونی ببری تو style.css */
    .bottom-nav {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      width: 100% !important;
      max-width: none !important;
      margin: 0 !important;
      border-radius: 0 !important;
      z-index: 150;
    }
    .bottom-nav-inner {
      direction: ltr;
      display: flex;
      width: 100%;
      justify-content: space-around;
      align-items: center;
      background: white;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
      padding: 10px 0;
      box-sizing: border-box;
    }
    .bottom-nav .nav-item { opacity: 0.45; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .bottom-nav .nav-item.active { opacity: 1; }
    .bottom-nav .nav-item img { width: 26px; height: 26px; }
    .bottom-nav .nav-item .nav-icon-emoji { font-size: 22px; }
    body { padding-bottom: 64px; }
  </style>
</head>
<body>

<a href="home.html" id="exit-lesson-btn" onclick="return confirm('از مرور خارج بشی؟');" style="position:fixed; top:16px; left:16px; z-index:200; background:white; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); text-decoration:none; font-size:20px; color:#4b4b4b;">✕</a>

<div id="hud">
  ❤️ <span id="heart-count">-</span>
  &nbsp;|&nbsp;
  <span id="review-progress">0/0</span>
</div>

<div id="app">
  <div id="review-empty" style="display:none; text-align:center; padding:40px 16px;">
    <h2>هنوز چیزی برای مرور نداری</h2>
    <p>اول چند تا درس رو تموم کن، بعد کلماتش اینجا برای مرور میان.</p>
    <a href="home.html">بازگشت</a>
  </div>

  <div id="review-question-box" style="display:none;">
    <h2 id="review-question-title"></h2>
    <div id="review-options"></div>
  </div>

  <div id="review-result" style="display:none; text-align:center; padding:40px 16px;">
    <h2 id="review-result-title"></h2>
    <p id="review-result-detail"></p>
    <a href="home.html">بازگشت</a>
  </div>
</div>

<!-- نب‌بار مشترک: درس | مرور | پیشرفت | پروفایل -->
<footer class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="#" id="nav-lesson" class="nav-item">
      <img src="/assets/icons/lesson.png" alt="درس">
    </a>
    <a href="#" id="nav-review" class="nav-item active">
      <span class="nav-icon-emoji">🔁</span>
    </a>
    <a href="#" id="nav-progress" class="nav-item">
      <img src="/assets/icons/progress.png" alt="پیشرفت">
    </a>
    <a href="#" id="nav-profile" class="nav-item">
      <img src="/assets/icons/profile.png" alt="پروفایل">
    </a>
  </div>
</footer>

<script src="dataStorage.js"></script>
<script src="courseRouter.js" type="module"></script>
<script src="review.js"></script>

</body>
</html>
